<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Chicken Point — Reposição</title>
<meta name="description" content="Lista de compras para reposição de estoque da Chicken Point" />
<meta name="theme-color" content="#17140F" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Chicken Point" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" href="icon-192.png" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #17140F; }
  body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
  button { font-family: inherit; cursor: pointer; }
  input, select { font-family: inherit; }
  ::selection { background: #E3A62F55; }
  .cp-scroll::-webkit-scrollbar { display: none; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ---------------------------------------------------------
   Chicken Point — Lista de Reposição
   Paleta: fritura noturna (carvão), mostarda tostada, páprica
--------------------------------------------------------- */

const CATEGORIES = ["Frangos", "Porções", "Bebidas", "Mercado"];

const DEFAULT_CATALOG = [
  { id: "c1", name: "Frango inteiro", category: "Frangos" },
  { id: "c2", name: "Peito de frango", category: "Frangos" },
  { id: "c3", name: "Coxa e sobrecoxa", category: "Frangos" },
  { id: "c4", name: "Asinha de frango", category: "Frangos" },
  { id: "c5", name: "Frango a passarinho", category: "Frangos" },
  { id: "p1", name: "Batata frita", category: "Porções" },
  { id: "p2", name: "Polenta frita", category: "Porções" },
  { id: "p3", name: "Mandioca frita", category: "Porções" },
  { id: "p4", name: "Onion rings", category: "Porções" },
  { id: "p5", name: "Nuggets", category: "Porções" },
  { id: "b1", name: "Coca-Cola lata", category: "Bebidas" },
  { id: "b2", name: "Guaraná lata", category: "Bebidas" },
  { id: "b3", name: "Suco de laranja", category: "Bebidas" },
  { id: "b4", name: "Água mineral", category: "Bebidas" },
  { id: "b5", name: "Cerveja long neck", category: "Bebidas" },
  { id: "m1", name: "Óleo de soja", category: "Mercado" },
  { id: "m2", name: "Sal", category: "Mercado" },
  { id: "m3", name: "Embalagem descartável", category: "Mercado" },
  { id: "m4", name: "Guardanapo", category: "Mercado" },
  { id: "m5", name: "Sacola plástica", category: "Mercado" },
];

const STORAGE_KEY = "chicken-point-data";
const OVERDUE_MS = 20 * 60 * 60 * 1000;
const CHECK_INTERVAL_MS = 30 * 60 * 1000;
const CAT_ICON = { Frangos: "🐔", Porções: "🍟", Bebidas: "🥤", Mercado: "🧂" };

function uid() {
  return Math.random().toString(36).slice(2, 9);
}
function timeAgoLabel(ts) {
  const diff = Date.now() - ts;
  const h = Math.floor(diff / 3600000);
  if (h < 1) return "adicionado agora";
  if (h < 24) return `há ${h}h na lista`;
  return `há ${Math.floor(h / 24)}d na lista`;
}
function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) {
    return null;
  }
}
function saveToStorage(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {
    console.error("Falha ao salvar dados", e);
  }
}

function ChickenPointApp() {
  const initial = loadFromStorage();
  const [catalog, setCatalog] = useState(initial?.catalog || DEFAULT_CATALOG);
  const [active, setActive] = useState(initial?.active || {});
  const [tab, setTab] = useState("Frangos");
  const [editMode, setEditMode] = useState(false);
  const [newItemName, setNewItemName] = useState("");
  const [newItemCat, setNewItemCat] = useState("Frangos");
  const [qtyDraft, setQtyDraft] = useState({});
  const [notifPermission, setNotifPermission] = useState(
    typeof Notification !== "undefined" ? Notification.permission : "unsupported"
  );
  const [showTicket, setShowTicket] = useState(true);
  const notifiedRef = useRef({});

  useEffect(() => {
    saveToStorage({ catalog, active });
  }, [catalog, active]);

  const pendingEntries = Object.entries(active)
    .filter(([, v]) => v.qty > 0)
    .map(([id, v]) => ({ ...v, item: catalog.find((c) => c.id === id) }))
    .filter((e) => e.item);

  const overdue = pendingEntries.filter((e) => Date.now() - e.addedAt > OVERDUE_MS);

  useEffect(() => {
    if (notifPermission !== "granted") return;
    const interval = setInterval(() => {
      overdue.forEach((e) => {
        if (notifiedRef.current[e.item.id]) return;
        try {
          new Notification("Chicken Point", {
            body: `Lucas, você esqueceu de comprar ${e.item.name.toLowerCase()}.`,
            icon: "icon-192.png",
          });
          notifiedRef.current[e.item.id] = true;
        } catch (err) {}
      });
    }, CHECK_INTERVAL_MS);
    return () => clearInterval(interval);
  }, [notifPermission, overdue]);

  const requestNotif = async () => {
    if (typeof Notification === "undefined") return;
    const perm = await Notification.requestPermission();
    setNotifPermission(perm);
  };

  const setQty = (id, qty) => {
    setActive((prev) => {
      const next = { ...prev };
      if (!qty || qty <= 0) delete next[id];
      else next[id] = { qty, addedAt: prev[id]?.addedAt || Date.now() };
      return next;
    });
  };
  const markBought = (id) => {
    setActive((prev) => {
      const next = { ...prev };
      delete next[id];
      return next;
    });
    delete notifiedRef.current[id];
  };
  const addCatalogItem = () => {
    const name = newItemName.trim();
    if (!name) return;
    setCatalog((prev) => [...prev, { id: uid(), name, category: newItemCat }]);
    setNewItemName("");
  };
  const removeCatalogItem = (id) => {
    setCatalog((prev) => prev.filter((c) => c.id !== id));
    setActive((prev) => {
      const next = { ...prev };
      delete next[id];
      return next;
    });
  };
  const renameCatalogItem = (id, name) => {
    setCatalog((prev) => prev.map((c) => (c.id === id ? { ...c, name } : c)));
  };

  const itemsInTab = catalog.filter((c) => c.category === tab);

  return (
    <div style={styles.page}>
      <div style={styles.shell}>
        <header style={styles.header}>
          <div>
            <div style={styles.eyebrow}>REPOSIÇÃO DE ESTOQUE</div>
            <h1 style={styles.title}>CHICKEN POINT</h1>
          </div>
          <button
            aria-label={notifPermission === "granted" ? "Lembretes ativos" : "Ativar lembretes"}
            onClick={requestNotif}
            style={{ ...styles.bellBtn, background: notifPermission === "granted" ? "#E3A62F" : "#2C251B" }}
            title={notifPermission === "granted" ? "Lembretes ativos" : "Ativar lembretes no navegador"}
          >
            <span style={{ fontSize: 18 }}>{notifPermission === "granted" ? "🔔" : "🔕"}</span>
          </button>
        </header>

        {pendingEntries.length > 0 && (
          <div style={styles.ticketWrap}>
            <button onClick={() => setShowTicket((s) => !s)} style={styles.ticketHeader}>
              <span style={styles.ticketHeaderLeft}>
                <span style={styles.ticketDot(overdue.length > 0)} />
                COMANDA — {pendingEntries.length} PENDENTE{pendingEntries.length > 1 ? "S" : ""}
                {overdue.length > 0 ? ` · ${overdue.length} ATRASADO${overdue.length > 1 ? "S" : ""}` : ""}
              </span>
              <span style={{ color: "#B5A990", transform: showTicket ? "rotate(90deg)" : "none", transition: "transform .15s", display: "inline-block" }}>›</span>
            </button>
            {showTicket && (
              <div style={styles.ticketBody}>
                {overdue.length > 0 && (
                  <div style={styles.reminderMsg}>
                    Lucas, você esqueceu de comprar {overdue[0].item.name.toLowerCase()}
                    {overdue.length > 1 ? ` (+${overdue.length - 1} item${overdue.length > 2 ? "s" : ""})` : ""}.
                  </div>
                )}
                {pendingEntries.map((e) => (
                  <div key={e.item.id} style={styles.ticketRow}>
                    <span style={styles.ticketQty}>{e.qty}×</span>
                    <span style={styles.ticketName}>{e.item.name}</span>
                    <span style={styles.ticketMeta}>{timeAgoLabel(e.addedAt)}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        <div style={styles.tabRow} className="cp-scroll">
          {CATEGORIES.map((cat) => (
            <button
              key={cat}
              onClick={() => setTab(cat)}
              style={{
                ...styles.tabBtn,
                background: tab === cat ? "#E3A62F" : "transparent",
                color: tab === cat ? "#17140F" : "#B5A990",
                borderColor: tab === cat ? "#E3A62F" : "#3A3226",
              }}
            >
              <span style={{ marginRight: 6 }}>{CAT_ICON[cat]}</span>
              {cat}
            </button>
          ))}
        </div>

        <main style={styles.list}>
          {itemsInTab.length === 0 && (
            <div style={styles.empty}>
              Nenhum item cadastrado em {tab} ainda. Toque em "Editar catálogo" para adicionar.
            </div>
          )}

          {itemsInTab.map((item) => {
            const isActive = !!active[item.id];
            const draft = qtyDraft[item.id];
            return (
              <div key={item.id} style={styles.row}>
                {editMode ? (
                  <>
                    <input value={item.name} onChange={(e) => renameCatalogItem(item.id, e.target.value)} style={styles.editInput} />
                    <button onClick={() => removeCatalogItem(item.id)} style={styles.iconBtnDanger} aria-label={`Remover ${item.name}`}>🗑</button>
                  </>
                ) : isActive ? (
                  <>
                    <div style={styles.rowName}>{item.name}</div>
                    <div style={styles.stepper}>
                      <button onClick={() => setQty(item.id, active[item.id].qty - 1)} style={styles.stepBtn} aria-label="Diminuir quantidade">−</button>
                      <span style={styles.stepQty}>{active[item.id].qty}</span>
                      <button onClick={() => setQty(item.id, active[item.id].qty + 1)} style={styles.stepBtn} aria-label="Aumentar quantidade">+</button>
                    </div>
                    <button onClick={() => markBought(item.id)} style={styles.boughtBtn} aria-label={`Marcar ${item.name} como comprado`} title="Marcar como comprado">✓</button>
                  </>
                ) : (
                  <>
                    <div style={styles.rowName}>{item.name}</div>
                    <input
                      inputMode="numeric"
                      pattern="[0-9]*"
                      placeholder="qtd"
                      value={draft ?? ""}
                      onChange={(e) => {
                        const v = e.target.value.replace(/[^0-9]/g, "");
                        setQtyDraft((prev) => ({ ...prev, [item.id]: v }));
                      }}
                      onKeyDown={(e) => {
                        if (e.key === "Enter" && draft) {
                          setQty(item.id, parseInt(draft, 10));
                          setQtyDraft((prev) => ({ ...prev, [item.id]: "" }));
                        }
                      }}
                      style={styles.qtyInput}
                    />
                    <button
                      onClick={() => {
                        if (draft) {
                          setQty(item.id, parseInt(draft, 10));
                          setQtyDraft((prev) => ({ ...prev, [item.id]: "" }));
                        }
                      }}
                      style={styles.addBtn}
                      aria-label={`Adicionar ${item.name} à lista`}
                    >+</button>
                  </>
                )}
              </div>
            );
          })}

          {editMode && (
            <div style={styles.newItemRow}>
              <select value={newItemCat} onChange={(e) => setNewItemCat(e.target.value)} style={styles.select}>
                {CATEGORIES.map((c) => (
                  <option key={c} value={c}>{CAT_ICON[c]} {c}</option>
                ))}
              </select>
              <input
                value={newItemName}
                onChange={(e) => setNewItemName(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && addCatalogItem()}
                placeholder="Novo item do catálogo"
                style={styles.editInput}
              />
              <button onClick={addCatalogItem} style={styles.addBtn} aria-label="Adicionar item ao catálogo">+</button>
            </div>
          )}
        </main>

        <footer style={styles.footer}>
          <button
            onClick={() => setEditMode((s) => !s)}
            style={{ ...styles.editToggle, background: editMode ? "#C1440E" : "#2C251B", color: editMode ? "#F5EFE3" : "#B5A990" }}
          >
            {editMode ? "✕ Concluir edição" : "✎ Editar catálogo"}
          </button>
        </footer>
      </div>
    </div>
  );
}

const styles = {
  page: { minHeight: "100vh", background: "#17140F", display: "flex", justifyContent: "center", fontFamily: "'Inter', sans-serif", padding: "0 0 24px" },
  shell: { width: "100%", maxWidth: 480, minHeight: "100vh", background: "#1C1811", display: "flex", flexDirection: "column" },
  header: { display: "flex", alignItems: "center", justifyContent: "space-between", padding: "24px 20px 16px", borderBottom: "1px solid #2C251B" },
  eyebrow: { fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, letterSpacing: "0.14em", color: "#C1440E", fontWeight: 600, marginBottom: 2 },
  title: { fontFamily: "'Bebas Neue', sans-serif", fontSize: 34, letterSpacing: "0.04em", color: "#F5EFE3", margin: 0, lineHeight: 1 },
  bellBtn: { width: 40, height: 40, borderRadius: 10, border: "1px solid #3A3226", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 },
  ticketWrap: { margin: "16px 20px 0", background: "#221D16", border: "1px solid #3A3226", borderRadius: 12, overflow: "hidden" },
  ticketHeader: { width: "100%", background: "transparent", border: "none", padding: "12px 14px", display: "flex", alignItems: "center", justifyContent: "space-between", color: "#F5EFE3" },
  ticketHeaderLeft: { fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, letterSpacing: "0.04em", display: "flex", alignItems: "center", gap: 8, color: "#F5EFE3" },
  ticketDot: (o) => ({ display: "inline-block", width: 7, height: 7, borderRadius: "50%", background: o ? "#C1440E" : "#E3A62F" }),
  ticketBody: { borderTop: "1px dashed #3A3226", padding: "10px 14px 14px" },
  reminderMsg: { fontFamily: "'IBM Plex Mono', monospace", fontSize: 12.5, color: "#E3A62F", background: "#2C251B", border: "1px solid #3A3226", borderRadius: 8, padding: "8px 10px", marginBottom: 10 },
  ticketRow: { display: "flex", alignItems: "baseline", gap: 8, fontFamily: "'IBM Plex Mono', monospace", fontSize: 13, color: "#D8CDB8", padding: "4px 0" },
  ticketQty: { color: "#E3A62F", fontWeight: 600, minWidth: 26 },
  ticketName: { flex: 1 },
  ticketMeta: { color: "#7A6E58", fontSize: 11 },
  tabRow: { display: "flex", gap: 8, padding: "16px 20px 4px", overflowX: "auto" },
  tabBtn: { flexShrink: 0, padding: "8px 14px", borderRadius: 999, border: "1px solid", fontSize: 13.5, fontWeight: 600, whiteSpace: "nowrap" },
  list: { flex: 1, padding: "8px 20px 12px", display: "flex", flexDirection: "column", gap: 8 },
  empty: { color: "#7A6E58", fontSize: 13.5, padding: "24px 4px", lineHeight: 1.5 },
  row: { display: "flex", alignItems: "center", gap: 10, background: "#221D16", border: "1px solid #2C251B", borderRadius: 10, padding: "10px 12px", minHeight: 52 },
  rowName: { flex: 1, color: "#F5EFE3", fontSize: 14.5, fontWeight: 500 },
  qtyInput: { width: 52, background: "#17140F", border: "1px solid #3A3226", borderRadius: 8, color: "#F5EFE3", fontFamily: "'IBM Plex Mono', monospace", fontSize: 14, padding: "8px 6px", textAlign: "center" },
  addBtn: { width: 34, height: 34, borderRadius: 8, background: "#E3A62F", border: "none", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 16, color: "#17140F", fontWeight: 700 },
  boughtBtn: { width: 34, height: 34, borderRadius: 8, background: "#6B8F47", border: "none", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 15, color: "#17140F", fontWeight: 700 },
  stepper: { display: "flex", alignItems: "center", gap: 8, background: "#17140F", border: "1px solid #3A3226", borderRadius: 8, padding: "4px 8px" },
  stepBtn: { background: "transparent", border: "none", color: "#E3A62F", display: "flex", alignItems: "center", justifyContent: "center", padding: 4, fontSize: 16, fontWeight: 700 },
  stepQty: { fontFamily: "'IBM Plex Mono', monospace", color: "#F5EFE3", fontSize: 14, minWidth: 18, textAlign: "center" },
  editInput: { flex: 1, background: "#17140F", border: "1px solid #3A3226", borderRadius: 8, color: "#F5EFE3", fontSize: 14, padding: "8px 10px" },
  iconBtnDanger: { width: 34, height: 34, borderRadius: 8, background: "#3A2018", border: "1px solid #C1440E55", color: "#C1440E", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 14 },
  newItemRow: { display: "flex", alignItems: "center", gap: 8, background: "#1C1811", border: "1px dashed #3A3226", borderRadius: 10, padding: "10px 12px", marginTop: 4 },
  select: { background: "#17140F", border: "1px solid #3A3226", borderRadius: 8, color: "#F5EFE3", fontSize: 13, padding: "8px 6px", flexShrink: 0, maxWidth: 108 },
  footer: { padding: "8px 20px 20px" },
  editToggle: { width: "100%", border: "none", borderRadius: 10, padding: "13px 0", fontSize: 14, fontWeight: 600, display: "flex", alignItems: "center", justifyContent: "center", gap: 8 },
};

ReactDOM.createRoot(document.getElementById("root")).render(<ChickenPointApp />);
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
